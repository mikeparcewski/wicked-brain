name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: cd server && npm install
      - run: cd server && npm test

  wiki:
    # Wiki integrity checks are platform-independent — run on ubuntu only.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: cd server && npm install
      - run: cd server && npm run gen:wiki:check
      - run: cd server && npm run lint:wiki:strict
