name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: cd server && npm install
      - run: cd server && npm test

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - name: Install server deps
        run: cd server && npm install --omit=dev

      # Trusted publishing — no NPM_TOKEN needed
      # Configure at: https://www.npmjs.com/package/wicked-brain/access
      # Link GitHub Actions as trusted publisher for this package
      - name: Publish to npm (trusted publisher + provenance)
        run: npm publish --access public --provenance

  publish-github-packages:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://npm.pkg.github.com
          scope: '@mikeparcewski'

      - name: Publish to GitHub Packages
        run: |
          npm pkg set name='@mikeparcewski/wicked-brain'
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  github-release:
    needs: [publish-npm, publish-github-packages]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
